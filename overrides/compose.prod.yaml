# ==============================================================================
# Production Override with Bind Mounts
# ==============================================================================
# Variables (set in .env or pass via command line):
#
#   SITES_PATH        - Site files (required)
#   MARIADB_PATH      - Database files (required)
#   REDIS_QUEUE_PATH  - Redis data (required)
#
# Use init-env.sh to generate .env with these paths from a single DATA_ROOT
# ==============================================================================

services:
  configurator:
    volumes:
      - ${SITES_PATH:-./data/sites}:/home/frappe/frappe-bench/sites
      - ${SITES_PATH:-./data/sites}/apps.txt:/home/frappe/frappe-bench/apps.txt:ro

  backend:
    volumes:
      - ${SITES_PATH:-./data/sites}:/home/frappe/frappe-bench/sites

  frontend:
    volumes:
      - ${SITES_PATH:-./data/sites}:/home/frappe/frappe-bench/sites

  websocket:
    volumes:
      - ${SITES_PATH:-./data/sites}:/home/frappe/frappe-bench/sites

  queue-short:
    volumes:
      - ${SITES_PATH:-./data/sites}:/home/frappe/frappe-bench/sites

  queue-long:
    volumes:
      - ${SITES_PATH:-./data/sites}:/home/frappe/frappe-bench/sites

  scheduler:
    volumes:
      - ${SITES_PATH:-./data/sites}:/home/frappe/frappe-bench/sites

  db:
    volumes:
      - ${MARIADB_PATH:-./data/mariadb}:/var/lib/mysql

  redis-queue:
    volumes:
      - ${REDIS_QUEUE_PATH:-./data/redis-queue}:/data

# Disable named volumes
volumes: !reset {}
